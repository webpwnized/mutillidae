; OWASP Mutillidae II - PHP Configuration
; WARNING: These settings are INSECURE and required for vulnerability demonstrations
; DO NOT use these settings in production environments

; Enable remote file inclusion (for vulnerability demonstrations)
allow_url_fopen = On
allow_url_include = On

; Display errors (for error-based injection demonstrations)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; File uploads (for file upload vulnerability demonstrations)
file_uploads = On
upload_max_filesize = 10M
post_max_size = 12M
max_file_uploads = 20

; Session settings
session.use_strict_mode = 0
session.use_cookies = 1
session.cookie_httponly = 0
session.cookie_secure = 0

; Memory and execution limits
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; Date timezone
date.timezone = UTC
